    SortParam:
      name: sort
      in: query
      description: Sort by
      schema:
        type: string
        enum:
          - id
          - -id
          - created_at
          - -created_at

  responses:
    Created:
      description: Created

    NoContent:
      description: No content

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppExceptionDto'

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppExceptionDto'

    UnprocesableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppExceptionDto'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppExceptionDto'

    Forbidden:
