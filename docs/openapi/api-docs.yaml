              schema:
                $ref: '#/components/schemas/PagedCustomersResponse'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    post:
      tags:
        - customer
      summary: Adds a new customer
      operationId: addCustomer
      requestBody:
        description: Customer object that needs to be added
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
        required: true
      responses:
        '201':
          $ref: '#/components/responses/Created'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    put:
      tags:
        - customer
      summary: Updates a customer by its id
      operationId: updateCustomer
      requestBody:
        description: Customer object that needs to be updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
        required: true
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /customers/{customer_id}:
    get:
      tags:
        - customer
      summary: Gets a customer by its id
      operationId: getCustomerById
      parameters:
        - name: customer_id
          in: path
          description: ID of customer to query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
