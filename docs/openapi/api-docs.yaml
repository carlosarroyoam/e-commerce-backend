openapi: 3.0.3
info:
  title: e-commerce-backend
  description: |
    API for managing a e-commerce.
    Supports customer management, products, categories.
  contact:
    email: carlosarroyoam@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.4.0-snapshot

servers:
  - url: http://localhost:3000/api/v1
    description: Localhost server url

tags:
  - name: auth
    description: Operations about authentication
  - name: user
    description: Operations about users
  - name: admin
    description: Operations about admin users
  - name: customer
    description: Operations about customer users
  - name: customer-address
    description: Operations about customer addresses
  - name: product
    description: Operations about products
  - name: product-variant
    description: Operations about product variants
  - name: attribute
    description: Operations about attributes
  - name: property
    description: Operations about properties
  - name: category
    description: Operations about categories
  - name: order
    description: Operations about orders
  - name: shipment
    description: Operations about shipments
  - name: refund
    description: Operations about refunds

paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: Authenticates a user
      operationId: authLogin
      requestBody:
        description: User credentials object that will be authenticated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      tags:
        - auth
      summary: Revokes a refresh token
      operationId: authLogout
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh-token:
    post:
      tags:
        - auth
      summary: Renews a user token
      operationId: refreshToken
      requestBody:
        description: User token object that will be renewed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/forgot-password:
    post:
      tags:
        - auth
      summary: Requests a user password reset
      operationId: forgotPassword
      requestBody:
        description: User credentials object that will be reseted
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/reset-password:
    post:
      tags:
        - auth
      summary: Resets a user password
      operationId: resetPassword
      parameters:
        - $ref: '#/components/parameters/resetPasswordTokenParam'
      requestBody:
        description: User password object that will be changed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /users:
    get:
      tags:
        - user
      summary: Gets all users
      operationId: getUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/UserSortParam'
        - $ref: '#/components/parameters/UserStatusParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUsersResponse'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /users/{user_id}:
    get:
      tags:
        - user
      summary: Gets a user by its id
      operationId: getUserById
      parameters:
        - name: user_id
          in: path
          description: ID of user to query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    delete:
      tags:
        - user
      summary: Deactivates a user by its id
      operationId: deactivateUser
      parameters:
        - name: user_id
          in: path
          description: ID of user to deactivate
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /users/{user_id}/change-password:
    put:
      tags:
        - user
      summary: Changes a user's password
      operationId: changeUserPassword
      parameters:
        - name: user_id
          in: path
          description: ID of user to change its password
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Admin object that needs to be updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /users/{user_id}/restore:
    put:
      tags:
        - user
      summary: Restores a user by its id
      operationId: restoreUser
      parameters:
        - name: user_id
          in: path
          description: ID of user to restore
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /admins:
    get:
      tags:
        - admin
      summary: Gets all admins
      operationId: getAdmins
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/UserSortParam'
        - $ref: '#/components/parameters/UserStatusParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    post:
      tags:
        - admin
      summary: Adds a new admin
      operationId: addAdmin
      requestBody:
        description: Admin object that needs to be added
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminRequest'
        required: true
      responses:
        '201':
          $ref: '#/components/responses/Created'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    put:
      tags:
        - admin
      summary: Updates a admin by its id
      operationId: updateAdmin
      requestBody:
        description: Admin object that needs to be updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminRequest'
        required: true
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /admins/{admin_id}:
    get:
      tags:
        - admin
      summary: Gets a admin by its id
      operationId: getAdminById
      parameters:
        - name: admin_id
          in: path
          description: ID of admin to query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
