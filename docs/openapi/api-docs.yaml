        id:
          type: integer
          description: Unique identifier for the category
        title:
          type: string
          description: Category title

    ProductCategory:
      type: object
      description: Product category reference
      properties:
        id:
          type: integer
          description: Unique identifier for the category
        title:
          type: string
          description: Category title

    Product:
      type: object
      description: Product information
      properties:
        id:
          type: integer
          description: Unique identifier for the product
        title:
          type: string
          description: Product title
        slug:
          type: string
          description: URL-friendly product identifier
        description:
          type: string
          description: Product description
        featured:
          type: boolean
          description: Indicates if product is featured
        active:
          type: boolean
          description: Indicates if product is active
        category:
          type: string
          description: Product category
        attribute_combinations:
          $ref: '#/components/schemas/Attribute'
        images:
          $ref: '#/components/schemas/VariantImage'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the product was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the product was last updated
        deleted_at:
          type: string
          format: date-time
          description: Timestamp when the product was deleted (soft delete)
          nullable: true

