          type: string
        variant_id:
          type: integer
        variantSku:
          type: string
        quantity:
          type: integer
        amount:
          type: number

    PaginationDto:
      type: object
      description: Pagination information for list endpoints
      properties:
        page:
          type: integer
          description: Current page number
        size:
          type: integer
          description: Number of items per page
        total_items:
          type: integer
          description: Total number of items
        total_pages:
          type: integer
          description: Total number of pages

    AppExceptionDto:
      type: object
      description: Standard error response returned when an application exception occurs.
      properties:
        message:
          type: string
          description: Human-readable error message.
        error:
          type: string
          description: Short error identifier or error type.
        status:
          type: integer
          description: HTTP status code associated with the error.
        details:
          type: object
          description: Additional validation or error details.
          additionalProperties:
            type: string
        path:
          type: string
          description: API endpoint path where the error occurred.
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error was generated.

  parameters:
    SizeParam:
      name: size
      in: query
      description: Pagination size items
      schema:
        type: integer
        default: 50

    PageParam:
      name: page
      in: query
      description: Pagination page number
      schema:
        type: integer
        default: 1

    SearchParam:
      name: search
      in: query
      description: Search criteria
      schema:
        type: string

    UserSortParam:
      name: sort
      in: query
      description: Sort by
      schema:
        type: string
        enum:
          - id
          - -id
          - first_name
          - -first_name
          - last_name
          - -last_name
          - email
          - -email

    UserStatusParam:
      name: status
      in: query
      description: User status
      schema:
        type: string
        enum:
          - active
          - inactive

    resetPasswordTokenParam:
      name: token
      in: query
      required: true
      schema:
        type: string

    ProductSortParam:
      name: sort
      in: query
      description: Sort by
      schema:
        type: string
        enum:
          - id
          - -id
          - title
          - -title

    CategorySortParam:
      name: sort
      in: query
      description: Sort by
      schema:
        type: string
        enum:
          - id
          - -id
          - title
          - -title

    AttributeSortParam:
      name: sort
      in: query
      description: Sort by
      schema:
        type: string
        enum:
          - id
          - -id
          - title
          - -title

    PropertySortParam:
      name: sort
      in: query
      description: Sort by
      schema:
        type: string
        enum:
          - id
          - -id
          - title
          - -title

    OrderSortParam:
      name: sort
      in: query
      description: Sort by
      schema:
        type: string
        enum:
          - id
          - -id
          - created_at
          - -created_at
          - total
          - -total

    ShipmentSortParam:
      name: sort
      in: query
      description: Sort by
      schema:
        type: string
        enum:
          - id
          - -id
          - shipped_at
