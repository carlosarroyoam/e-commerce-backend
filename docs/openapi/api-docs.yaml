      required:
        - email
        - password
        - device_fingerprint

    LoginResponse:
      type: object
      description: Login response with user information
      properties:
        id:
          type: integer
          description: Unique identifier for the user
        first_name:
          type: string
          description: User's first name
        last_name:
          type: string
          description: User's last name
        email:
          type: string
          description: User's email address
        user_role_id:
