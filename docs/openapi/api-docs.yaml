        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    put:
      tags:
        - customer-address
      summary: Updates a customer address by its id
      operationId: updateCustomerAddressById
      parameters:
        - name: customer_id
          in: path
          description: ID of the customer to query
          required: true
          schema:
            type: integer
            format: int64
        - name: address_id
          in: path
          description: ID of the address to query
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Address object that needs to be updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerAddressRequest'
        required: true
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    delete:
      tags:
        - customer-address
      summary: Deletes a customer address by its id
      operationId: deleteCustomerAddress
      parameters:
        - name: customer_id
          in: path
          description: ID of the customer to query
          required: true
