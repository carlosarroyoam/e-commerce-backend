        product_id:
          type: integer
        productTitle:
          type: string
        variant_id:
          type: integer
        variantSku:
          type: string
        variantName:
          type: string
        quantity:
          type: integer
        unit_price:
          type: number
        total:
          type: number

    OrderStatusHistory:
