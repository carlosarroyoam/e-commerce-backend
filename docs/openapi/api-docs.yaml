      summary: Gets a product variant by its id
      operationId: getProductVariantById
      parameters:
        - name: product_id
          in: path
          description: ID of product to query
          required: true
          schema:
            type: integer
            format: int64
        - name: variant_id
          in: path
          description: ID of variant to query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
        '422':
