        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /customers/{customer_id}/addresses:
    get:
      tags:
        - customer-address
      summary: Gets all customer addresses by customer_id
      operationId: getCustomerAddresses
      parameters:
        - name: customer_id
          in: path
          required: true
          description: ID of the customer to retrieve its addresses
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerAddress'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

    post:
      tags:
        - customer-address
      summary: Adds a new customer address
      operationId: addCustomerAddress
      parameters:
        - name: customer_id
          in: path
          required: true
          description: ID of the customer to retrieve its addresses
          schema:
            type: integer
      requestBody:
        description: Address object that needs to be added
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerAddressRequest'
        required: true
      responses:
        '201':
          $ref: '#/components/responses/Created'
        '422':
          $ref: '#/components/responses/UnprocesableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
