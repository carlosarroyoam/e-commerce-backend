          type: string
          format: date-time
          description: Timestamp when the admin was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the admin was last updated
        deleted_at:
          type: string
          format: date-time
          description: Timestamp when the admin was deleted (soft delete)
          nullable: true

    Customer:
      type: object
      description: Customer information
      properties:
        id:
          type: integer
          description: Unique identifier for the customer
        user_id:
          type: integer
          description: Foreign key to users table
        first_name:
          type: string
          description: Customer's first name
        last_name:
          type: string
          description: Customer's last name
        email:
          type: string
          description: Customer's email address
        addresses:
          type: array
          description: List of customer addresses
          items:
            $ref: '#/components/schemas/CustomerAddress'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the customer was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the customer was last updated
        deleted_at:
          type: string
          format: date-time
          description: Timestamp when the customer was deleted (soft delete)
          nullable: true

