  /attributes:
    get:
      tags:
        - attribute
      summary: Gets all attributes
      operationId: getAttributes
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/AttributeSortParam'
